<div id="subscribe-loader" style="text-align:center;padding:3rem;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#6b7280;">
  <p style="font-size:1.5rem;">Loading exclusive deals...</p>
  <div style="width:60%;max-width:300px;height:3px;background:#e5e7eb;border-radius:3px;margin:1rem auto 0;overflow:hidden;">
    <div id="subscribe-progress" style="width:0%;height:100%;background:#337ab7;border-radius:3px;transition:width 0.3s linear;"></div>
  </div>
</div>
<iframe
  id="subscribe-frame"
  style="width:100%;border:none;height:500px;display:none;background:#fff;"
  title="Subscribe for promotions"
></iframe>
<script>
(function() {
  var url = 'https://subscribe-8m41.onrender.com';
  var bar = document.getElementById('subscribe-progress');
  var progress = 0;
  var timer = setInterval(function() {
    progress += 3;
    if (progress > 95) progress = 95;
    bar.style.width = progress + '%';
  }, 300);
  function check() {
    fetch(url + '/ping', { mode: 'no-cors' })
      .then(function() {
        clearInterval(timer);
        bar.style.width = '100%';
        var frame = document.getElementById('subscribe-frame');
        frame.src = url;
        frame.onload = function() {
          frame.style.display = 'block';
          document.getElementById('subscribe-loader').style.display = 'none';
        };
      })
      .catch(function() { setTimeout(check, 2000); });
  }
  check();
})();
</script>
