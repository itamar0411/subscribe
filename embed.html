<link rel="stylesheet" href="https://subscribe-8m41.onrender.com/widget.css">

<div id="subscribe-widget">
  <div class="card">
    <div id="form-section">
      <div class="card-header">
        <div class="icon">🎁</div>
        <h1>Get Exclusive Deals</h1>
        <p>Subscribe and be the first to know about our special promotions and offers.</p>
      </div>

      <form id="subscribe-form" novalidate>
        <div class="row">
          <div class="field">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="firstName" placeholder="Jane" autocomplete="given-name" />
            <span class="field-error" id="first-name-error"></span>
          </div>
          <div class="field">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="lastName" placeholder="Doe" autocomplete="family-name" />
            <span class="field-error" id="last-name-error"></span>
          </div>
        </div>

        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" autocomplete="email" />
          <span class="field-error" id="email-error"></span>
        </div>

        <button type="submit" id="submit-btn">Subscribe Now</button>
      </form>
    </div>

    <div class="success" id="success-section">
      <div class="check">✅</div>
      <h2>You're in!</h2>
      <p>Thanks for subscribing. We'll send you our best promotions soon.</p>
    </div>
  </div>

  <script>
  (() => {
    const form           = document.getElementById('subscribe-form');
    const submitBtn      = document.getElementById('submit-btn');
    const formSection    = document.getElementById('form-section');
    const successSection = document.getElementById('success-section');

    function isValidEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v.trim()); }

    function isLegitEmail(value) {
      const email = value.trim().toLowerCase();
      const [local, domain] = email.split('@');
      if (/^(test|fake|asdf|qwerty|noreply|donotreply|null|undefined|example|nope|xxx|aaa|bbb|123|abc)\d*$/.test(local)) return false;
      if (local.length < 2 || local.length > 64) return false;
      const disposable = new Set(['mailinator.com','guerrillamail.com','guerrillamail.net','guerrillamail.org','sharklasers.com','grr.la','spam4.me','trashmail.com','trashmail.me','trashmail.net','trashmail.at','trashmail.io','yopmail.com','yopmail.fr','tempr.email','dispostable.com','throwam.com','maildrop.cc','getairmail.com','filzmail.com','spamgourmet.com','fakeinbox.com','mailnull.com','spamspot.com']);
      if (disposable.has(domain)) return false;
      if (['example.com','example.net','example.org','test.com','localhost'].includes(domain)) return false;
      const parts = domain.split('.');
      if (parts.length < 2) return false;
      if (!/^[a-z]{2,10}$/.test(parts[parts.length - 1])) return false;
      if (/^(.)\1{2,}$/.test(parts[parts.length - 2])) return false;
      return true;
    }

    function showError(inputId, errorId, msg) {
      document.getElementById(inputId).classList.add('invalid');
      document.getElementById(errorId).textContent = msg;
      return false;
    }
    function clearError(inputId, errorId) {
      document.getElementById(inputId).classList.remove('invalid');
      document.getElementById(errorId).textContent = '';
    }

    ['first-name', 'last-name', 'email'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => clearError(id, id + '-error'));
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('first-name').value.trim();
      const lastName  = document.getElementById('last-name').value.trim();
      const email     = document.getElementById('email').value.trim();

      ['first-name', 'last-name', 'email'].forEach(id => clearError(id, id + '-error'));
      let valid = true;
      if (!firstName) valid = showError('first-name', 'first-name-error', 'First name is required.');
      if (!lastName)  valid = showError('last-name',  'last-name-error',  'Last name is required.');
      if (!email)                    valid = showError('email', 'email-error', 'Email address is required.');
      else if (!isValidEmail(email)) valid = showError('email', 'email-error', 'Please enter a valid email address.');
      if (!valid) return;

      if (!isLegitEmail(email)) { simulateSuccess(); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Subscribing…';
      try {
        const res = await fetch('https://subscribe-8m41.onrender.com/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firstName, lastName, email }),
        });
        if (!res.ok) throw new Error();
        showSuccess();
      } catch {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Subscribe Now';
        alert('Something went wrong. Please try again later.');
      }
    });

    function simulateSuccess() {
      submitBtn.disabled = true;
      submitBtn.textContent = 'Subscribing…';
      setTimeout(showSuccess, 900);
    }
    function showSuccess() {
      formSection.style.display = 'none';
      successSection.style.display = 'block';
    }
  })();
  </script>
</div>
