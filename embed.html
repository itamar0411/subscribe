<div id="subscribe-loader" style="text-align:center;padding:3rem;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#6b7280;">
  <p style="font-size:1.1rem;">Loading exclusive deals...</p>
</div>
<iframe
  id="subscribe-frame"
  style="width:100%;border:none;height:500px;display:none;background:#fff;"
  title="Subscribe for promotions"
></iframe>
<script>
(function() {
  var url = 'https://subscribe-8m41.onrender.com';
  function check() {
    fetch(url + '/ping', { mode: 'no-cors' })
      .then(function() {
        var frame = document.getElementById('subscribe-frame');
        frame.src = url;
        frame.onload = function() {
          frame.style.display = 'block';
          document.getElementById('subscribe-loader').style.display = 'none';
        };
      })
      .catch(function() { setTimeout(check, 2000); });
  }
  check();
})();
</script>
