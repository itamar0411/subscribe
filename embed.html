<link rel="stylesheet" href="https://subscribe-8m41.onrender.com/widget.css">
<div id="subscribe-widget">

  <div class="sw-wrap">
    <div class="sw-card">
      <div id="sw-form-section">
        <div class="sw-header">
          <div class="sw-icon">🎁</div>
          <h2>Get Exclusive Deals</h2>
          <p>Subscribe and be the first to know about our special promotions and offers.</p>
        </div>

        <form id="sw-form" novalidate>
          <div class="sw-row">
            <div class="sw-field">
              <label for="sw-first-name">First Name</label>
              <input type="text" id="sw-first-name" placeholder="Jane" autocomplete="given-name" />
              <span class="sw-error" id="sw-first-name-error"></span>
            </div>
            <div class="sw-field">
              <label for="sw-last-name">Last Name</label>
              <input type="text" id="sw-last-name" placeholder="Doe" autocomplete="family-name" />
              <span class="sw-error" id="sw-last-name-error"></span>
            </div>
          </div>

          <div class="sw-field">
            <label for="sw-email">Email Address</label>
            <input type="email" id="sw-email" placeholder="jane@example.com" autocomplete="email" />
            <span class="sw-error" id="sw-email-error"></span>
          </div>

          <button type="submit" id="sw-submit-btn" class="sw-btn">Subscribe Now</button>
        </form>
      </div>

      <div class="sw-success" id="sw-success-section">
        <div class="sw-check">✅</div>
        <h2>You're in!</h2>
        <p>Thanks for subscribing. We'll send you our best promotions soon.</p>
      </div>
    </div>
  </div>

  <script>
  (() => {
    const form           = document.getElementById('sw-form');
    const submitBtn      = document.getElementById('sw-submit-btn');
    const formSection    = document.getElementById('sw-form-section');
    const successSection = document.getElementById('sw-success-section');

    function isValidEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v.trim()); }

    function isLegitEmail(value) {
      const email = value.trim().toLowerCase();
      const [local, domain] = email.split('@');
      if (/^(test|fake|asdf|qwerty|noreply|donotreply|null|undefined|example|nope|xxx|aaa|bbb|123|abc)\d*$/.test(local)) return false;
      if (local.length < 2 || local.length > 64) return false;
      const disposable = new Set(['mailinator.com','guerrillamail.com','guerrillamail.net','guerrillamail.org','sharklasers.com','grr.la','spam4.me','trashmail.com','trashmail.me','trashmail.net','trashmail.at','trashmail.io','yopmail.com','yopmail.fr','tempr.email','dispostable.com','throwam.com','maildrop.cc','getairmail.com','filzmail.com','spamgourmet.com','fakeinbox.com','mailnull.com','spamspot.com']);
      if (disposable.has(domain)) return false;
      if (['example.com','example.net','example.org','test.com','localhost'].includes(domain)) return false;
      const parts = domain.split('.');
      if (parts.length < 2) return false;
      if (!/^[a-z]{2,10}$/.test(parts[parts.length - 1])) return false;
      if (/^(.)\1{2,}$/.test(parts[parts.length - 2])) return false;
      return true;
    }

    function showError(inputId, errorId, msg) {
      document.getElementById(inputId).classList.add('sw-invalid');
      document.getElementById(errorId).textContent = msg;
      return false;
    }
    function clearError(inputId, errorId) {
      document.getElementById(inputId).classList.remove('sw-invalid');
      document.getElementById(errorId).textContent = '';
    }

    ['sw-first-name','sw-last-name','sw-email'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => clearError(id, id + '-error'));
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('sw-first-name').value.trim();
      const lastName  = document.getElementById('sw-last-name').value.trim();
      const email     = document.getElementById('sw-email').value.trim();

      ['sw-first-name','sw-last-name','sw-email'].forEach(id => clearError(id, id + '-error'));
      let valid = true;
      if (!firstName) valid = showError('sw-first-name', 'sw-first-name-error', 'First name is required.');
      if (!lastName)  valid = showError('sw-last-name',  'sw-last-name-error',  'Last name is required.');
      if (!email)                    valid = showError('sw-email', 'sw-email-error', 'Email address is required.');
      else if (!isValidEmail(email)) valid = showError('sw-email', 'sw-email-error', 'Please enter a valid email address.');
      if (!valid) return;

      if (!isLegitEmail(email)) { simulateSuccess(); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Subscribing…';
      try {
        const res = await fetch('https://subscribe-8m41.onrender.com/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firstName, lastName, email }),
        });
        if (!res.ok) throw new Error();
        showSuccess();
      } catch {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Subscribe Now';
        alert('Something went wrong. Please try again later.');
      }
    });

    function simulateSuccess() {
      submitBtn.disabled = true;
      submitBtn.textContent = 'Subscribing…';
      setTimeout(showSuccess, 900);
    }
    function showSuccess() {
      formSection.style.display = 'none';
      successSection.style.display = 'block';
    }
  })();
  </script>
</div>
