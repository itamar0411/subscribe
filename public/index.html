<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscribe for Promotions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05), 0 10px 40px rgba(0,0,0,0.1);
      border: 1.5px solid #e5e7eb;
    }

    .card-header {
      text-align: center;
      margin-bottom: 2.25rem;
    }

    .card-header .icon { font-size: 2.75rem; margin-bottom: 0.85rem; }

    .card-header h1 {
      font-size: 2.1rem;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    .card-header p {
      color: #6b7280;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .row { display: flex; gap: 1rem; }

    .field {
      display: flex;
      flex-direction: column;
      margin-bottom: 1.25rem;
      flex: 1;
    }

    label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    input {
      padding: 0.75rem 1rem;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 1.05rem;
      color: #111827;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      width: 100%;
      font-family: inherit;
    }

    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    input.invalid { border-color: #ef4444; }

    .field-error {
      font-size: 0.78rem;
      color: #ef4444;
      margin-top: 0.3rem;
      min-height: 1rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.15rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      font-family: inherit;
      letter-spacing: 0.01em;
      transition: opacity 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover   { opacity: 0.92; }
    button[type="submit"]:active  { transform: scale(0.98); }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

    .success {
      display: none;
      text-align: center;
      padding: 2.5rem 1rem;
    }

    .success .check { font-size: 3.5rem; margin-bottom: 1rem; }

    .success h2 {
      color: #1a1a2e;
      margin-bottom: 0.75rem;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .success p {
      color: #6b7280;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .success .badge {
      display: inline-block;
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      border-radius: 10px;
      padding: 0.75rem 1.5rem;
      color: #16a34a;
      font-size: 0.9rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="form-section">
      <div class="card-header">
        <div class="icon">🎁</div>
        <h1>Get Exclusive Deals</h1>
        <p>Subscribe and be the first to know about our special promotions and offers.</p>
      </div>

      <form id="subscribe-form" novalidate>
        <div class="row">
          <div class="field">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="firstName" placeholder="Jane" autocomplete="given-name" />
            <span class="field-error" id="first-name-error"></span>
          </div>
          <div class="field">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="lastName" placeholder="Doe" autocomplete="family-name" />
            <span class="field-error" id="last-name-error"></span>
          </div>
        </div>

        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" autocomplete="email" />
          <span class="field-error" id="email-error"></span>
        </div>

        <button type="submit" id="submit-btn">Subscribe Now</button>
      </form>
    </div>

    <div class="success" id="success-section">
      <div class="check">🎉</div>
      <h2>You're subscribed!</h2>
      <p>Thanks for signing up! We'll be in touch soon with our best exclusive deals and promotions.</p>
      <div class="badge">✓ Your email has been confirmed</div>
    </div>
  </div>

  <script src="subscribe.js"></script>
</body>
</html>
