<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscribe for Promotions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .card-header .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .card-header h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 0.4rem;
    }

    .card-header p {
      color: #6b7280;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .row {
      display: flex;
      gap: 0.75rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      margin-bottom: 1.1rem;
      flex: 1;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.35rem;
    }

    input {
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      width: 100%;
    }

    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    input.invalid {
      border-color: #ef4444;
    }

    .field-error {
      font-size: 0.78rem;
      color: #ef4444;
      margin-top: 0.3rem;
      min-height: 1rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover { opacity: 0.92; }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

    .success {
      display: none;
      text-align: center;
      padding: 1.5rem 0 0.5rem;
    }

    .success .check {
      font-size: 3rem;
      margin-bottom: 0.75rem;
    }

    .success h2 {
      color: #1a1a2e;
      margin-bottom: 0.4rem;
    }

    .success p {
      color: #6b7280;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="form-section">
      <div class="card-header">
        <div class="icon">🎁</div>
        <h1>Get Exclusive Deals</h1>
        <p>Subscribe and be the first to know about our special promotions and offers.</p>
      </div>

      <form id="subscribe-form" novalidate>
        <div class="row">
          <div class="field">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="firstName" placeholder="Jane" autocomplete="given-name" />
            <span class="field-error" id="first-name-error"></span>
          </div>
          <div class="field">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="lastName" placeholder="Doe" autocomplete="family-name" />
            <span class="field-error" id="last-name-error"></span>
          </div>
        </div>

        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" autocomplete="email" />
          <span class="field-error" id="email-error"></span>
        </div>

        <button type="submit" id="submit-btn">Subscribe Now</button>
      </form>
    </div>

    <div class="success" id="success-section">
      <div class="check">✅</div>
      <h2>You're in!</h2>
      <p>Thanks for subscribing. We'll send you our best promotions soon.</p>
    </div>
  </div>

  <script src="subscribe.js"></script>
</body>
</html>
